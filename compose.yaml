services:
  otel-collector:
    profiles: [obs]
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    expose:
      - "8889"
    depends_on:
      - jaeger

  jaeger:
    profiles: [obs]
    image: jaegertracing/all-in-one:1.54
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"
    expose:
      - "4317"
    networks:
      default:
        aliases:
          - jaeger-otlp

  prometheus:
    profiles: [obs]
    image: prom/prometheus:v2.50.1
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - otel-collector

  # NOTE: Grafana is configured for LOCAL DEVELOPMENT only.
  # For shared/remote deployments, disable anonymous access and set a strong admin password.
  grafana:
    profiles: [obs]
    image: grafana/grafana:10.3.3
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus

  web:
    profiles: [web]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
    environment:
      OTEL_ENABLED: "false"

  web-obs:
    profiles: [web-obs]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
    environment:
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    depends_on:
      - otel-collector
