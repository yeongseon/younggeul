name: Diagnose MOLIT

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      KPUBDATA_DATAGO_API_KEY: ${{ secrets.KPUBDATA_DATAGO_API_KEY }}
    steps:
      - name: Show runner public IP
        run: curl -s https://api.ipify.org && echo

      - name: Direct MOLIT API call (raw)
        run: |
          set -x
          URL="https://apis.data.go.kr/1613000/RTMSDataSvcAptTradeDev/getRTMSDataSvcAptTradeDev"
          curl -sS -G "$URL" \
            --data-urlencode "serviceKey=${KPUBDATA_DATAGO_API_KEY}" \
            --data-urlencode "LAWD_CD=11680" \
            --data-urlencode "DEAL_YMD=202503" \
            --data-urlencode "numOfRows=5" \
            --data-urlencode "pageNo=1" \
            -o /tmp/molit_resp.xml -w "HTTP %{http_code}\nBytes: %{size_download}\n"
          echo "--- response head ---"
          head -c 4000 /tmp/molit_resp.xml
          echo
          echo "--- response tail ---"
          tail -c 1000 /tmp/molit_resp.xml
