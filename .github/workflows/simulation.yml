name: Simulation
on:
  workflow_dispatch:
    inputs:
      snapshot_id:
        description: "Dataset snapshot ID"
        required: true
      query:
        description: "Simulation query"
        required: true
        default: "강남구 아파트 매매 방향 예측"
      max_rounds:
        description: "Maximum simulation rounds"
        default: "6"
permissions:
  contents: read
  models: read
jobs:
  simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Check GitHub Models token
        run: |
          if [ -z "$GH_MODELS_TOKEN" ]; then
            echo "::warning::GH_MODELS_TOKEN not set. Cannot run simulation."
            exit 1
          fi
      - name: Run simulation
        run: >-
          younggeul simulate
          --query "${{ inputs.query }}"
          --max-rounds ${{ inputs.max_rounds }}
          --model-id github/openai/gpt-4o-mini
          --run-name "gha-${{ github.run_id }}-${{ inputs.snapshot_id }}"
          --output-dir reports
      - name: Upload report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: simulation-report
          path: reports/
          if-no-files-found: ignore
