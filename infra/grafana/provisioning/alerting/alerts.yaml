apiVersion: 1

groups:
  - orgId: 1
    name: younggeul-observability
    folder: younggeul
    interval: 1m
    rules:
      - uid: high-simulation-failure-rate
        title: HighSimulationFailureRate
        condition: A
        for: 5m
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: rate(younggeul_simulation_runs_total{status="error"}[5m]) / rate(younggeul_simulation_runs_total[5m]) > 0.5
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: Simulation error rate is above 50% for 5 minutes.
        labels:
          severity: critical

      - uid: high-llm-latency
        title: HighLLMLatency
        condition: A
        for: 5m
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: histogram_quantile(0.95, rate(younggeul_llm_request_duration_seconds_bucket[5m])) > 30
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: LLM request p95 latency is above 30 seconds for 5 minutes.
        labels:
          severity: warning

      - uid: citation-gate-failure-spike
        title: CitationGateFailureSpike
        condition: A
        for: 5m
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: rate(younggeul_citation_gate_failures_total[5m]) > 0.1
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: Citation gate failures exceed 0.1 events/second for 5 minutes.
        labels:
          severity: warning
