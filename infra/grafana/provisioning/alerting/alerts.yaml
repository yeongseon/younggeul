apiVersion: 1

groups:
  - orgId: 1
    name: younggeul-observability
    folder: younggeul
    interval: 1m
    rules:
      - uid: high-simulation-failure-rate
        title: HighSimulationFailureRate
        condition: A
        for: 5m
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: (sum(rate(younggeul_simulation_runs_total{status="error"}[5m])) / sum(rate(younggeul_simulation_runs_total[5m]))) > 0.3 and sum(rate(younggeul_simulation_runs_total[5m])) > 0.01
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: Simulation error rate is above 30% for 5 minutes with minimum run volume (> 0.01 runs/sec).
        labels:
          severity: critical

      - uid: high-llm-latency
        title: HighLLMLatency
        condition: A
        for: 5m
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: histogram_quantile(0.95, rate(younggeul_llm_request_duration_seconds_bucket[5m])) > 30
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: LLM request p95 latency is above 30 seconds for 5 minutes.
        labels:
          severity: warning

      - uid: citation-gate-failure-spike
        title: CitationGateFailureSpike
        condition: A
        for: 5m
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: sum(rate(younggeul_citation_gate_failures_total[5m])) > 0.1 and sum(increase(younggeul_citation_gate_failures_total[5m])) > 3
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: Citation gate failures exceed 0.1 events/second for 5 minutes with minimum absolute failures (> 3 in 5m).
        labels:
          severity: warning

      - uid: stuck-running-simulation
        title: StuckRunningSimulation
        condition: A
        for: 10m
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: younggeul_simulation_active_runs > 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: A simulation has been in running state for more than 10 minutes.
        labels:
          severity: warning
